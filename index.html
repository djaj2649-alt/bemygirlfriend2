<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Latiefa 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ffdde1, #ee9ca7);
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
  text-align: center;
}

/* container */
.box {
  max-width: 500px;
}

/* buttons */
button {
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  font-size: 18px;
  cursor: pointer;
  margin: 10px;
  transition: 0.3s;
}

#yes {
  background: #4CAF50;
  color: white;
}

#maybe {
  background: #ff9800;
  color: white;
  position: relative;
}

#no {
  background: #ff4d4d;
  color: white;
}

/* break animation */
.break {
  animation: shatter 0.6s forwards;
}

@keyframes shatter {
  0% { transform: scale(1) rotate(0deg); opacity: 1; }
  100% {
    transform: scale(0) rotate(720deg) translateY(200px);
    opacity: 0;
  }
}

/* yes screen */
.red {
  background: red !important;
  transition: 1s;
}

/* hearts */
.heart {
  position: absolute;
  color: white;
  font-size: 18px;
  animation: float 5s linear infinite;
  opacity: 0.8;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

/* name overlay */
.name {
  position: absolute;
  font-size: 30px;
  font-weight: bold;
  opacity: 0.3;
  animation: fade 2s infinite alternate;
}

@keyframes fade {
  from { opacity: 0.2; }
  to { opacity: 0.6; }
}
</style>
</head>

<body id="body">

<div class="box" id="box">
  <h1>Hey Latiefa 💖</h1>
  <p>One last question...</p>
  <h2>Will you be my girlfriend?</h2>

  <button id="yes" onclick="yes()">Yes 💕</button>
  <button id="maybe" onclick="maybe()">Maybe 👀</button>
  <button id="no">No 😭</button>
</div>

<script>

function maybe() {
  let btn = document.getElementById("maybe");

  // break effect
  btn.classList.add("break");

  setTimeout(() => {
    btn.remove();
  }, 600);
}

function yes() {
  document.body.classList.add("red");

  document.getElementById("box").innerHTML =
    "<h1>❤️ She said YES ❤️</h1>";

  startHearts();
  startNames();
}

function startHearts() {
  for (let i = 0; i < 40; i++) {
    let h = document.createElement("div");
    h.classList.add("heart");
    h.innerHTML = "❤️";
    h.style.left = Math.random() * 100 + "vw";
    h.style.animationDuration = (3 + Math.random() * 3) + "s";
    document.body.appendChild(h);

    setTimeout(() => h.remove(), 6000);
  }
}

function startNames() {
  for (let i = 0; i < 20; i++) {
    let n = document.createElement("div");
    n.classList.add("name");
    n.innerText = "Latiefa";
    n.style.left = Math.random() * 100 + "vw";
    n.style.top = Math.random() * 100 + "vh";
    document.body.appendChild(n);
  }
}

</script>

</body>
</html>
