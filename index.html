<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Have a Question...</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffe6e6;
            text-align: center;
            overflow: hidden;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 85%;
            z-index: 10;
        }

        h1 {
            color: #ff4d6d;
            font-size: 2rem;
            margin-bottom: 10px;
            min-height: 60px;
        }

        .status-text {
            color: #555;
            font-size: 1rem;
            margin-bottom: 20px;
            font-style: italic;
            min-height: 20px;
        }

        .gif-container img {
            width: 180px;
            height: 180px;
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 50px;
            position: relative;
            margin-top: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            transition: transform 0.2s ease;
        }

        #noBtn {
            background-color: #777;
            color: white;
            position: absolute;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="gif-container">
            <img id="statusGif" src="https://media.giphy.com/media/c7ggb8e2HNG/giphy.gif" alt="Cute animation">
        </div>
        <h1 id="questionText">Will you be my girlfriend?</h1>
        <div id="statusText" class="status-text">Think carefully... 😉</div>
        
        <div class="buttons">
            <button id="yesBtn" onclick="selectYes()">Yes</button>
            <button id="noBtn" onmouseover="moveNoButton()" onclick="moveNoButton()">No</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const questionText = document.getElementById('questionText');
        const statusText = document.getElementById('statusText');
        const statusGif = document.getElementById('statusGif');

        let noCount = 0;
        
        // Initial button layout positioning
        noBtn.style.left = '140px'; 
        noBtn.style.top = '0px';

        // Funny messages that cycle as she tries to click No
        const roastMessages = [
            "Wait, you missed the button! Try again? 😂",
            "Error 404: 'No' option not found. 🖥️",
            "Are you sure? Click 'Yes' just to test it...",
            "Wow, you're really trying hard to click that, huh? 🤔",
            "My JavaScript code is stronger than your determination.",
            "Legend says she is still trying to click No to this day..."
        ];

        function moveNoButton() {
            noCount++;
            
            // Phase 1: Mild confusion
            if (noCount === 2) {
                statusText.innerHTML = "Hey, why is the button moving? 🤨";
                yesBtn.style.transform = "scale(1.1)"; // Yes button gets slightly bigger
            } 
            // Phase 2: Growing the Yes button aggressively
            else if (noCount === 5) {
                statusText.innerHTML = "Resistance is futile. Look how big 'Yes' is getting!";
                yesBtn.style.transform = "scale(1.3)";
                statusGif.src = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHI0ZWhndm93NDBoZWhndm93NDBoZWhndm93NDBoZWhndm93NDBoZSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/du3J3cXyzhj75IOgvA/giphy.gif";
            } 
            // Phase 3: Total Roast mode
            else if (noCount > 5) {
                const randomMessage = roastMessages[Math.floor(Math.random() * roastMessages.length)];
                statusText.innerHTML = `${randomMessage} (Missed count: ${noCount})`;
                // Make Yes button massive
                let currentScale = 1.3 + (noCount * 0.05);
                yesBtn.style.transform = `scale(${Math.min(currentScale, 2.2)})`; 
            }

            // Calculate random jumping positions
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 40);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 40);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        // Final Phase: The Success Screen
        function selectYes() {
            questionText.innerHTML = "Yay! Best decision ever! ❤️";
            
            if (noCount > 0) {
                statusText.innerHTML = `After failing to click No ${noCount} times, you finally saw the light! 🥰`;
            } else {
                statusText.innerHTML = "First try! You didn't even hesitate. Real one. 🥺❤️";
            }
            
            statusGif.src = "https://media.giphy.com/media/KztT2c4Y8m7dxkW925/giphy.gif";
            
            // Hide the No button entirely
            noBtn.style.display = 'none';
            // Reset Yes button style
            yesBtn.style.transform = "scale(1)";
            yesBtn.removeAttribute("onclick");
        }
    </script>
</body>
</html>
