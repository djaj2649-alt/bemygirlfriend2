<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Have a Question...</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffe6e6;
            text-align: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        h1 {
            color: #ff4d6d;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .gif-container img {
            width: 200px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 50px;
            position: relative;
        }

        button {
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
        }

        #noBtn {
            background-color: #777;
            color: white;
            position: absolute;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="gif-container">
            <!-- You can swap this out with any cute GIF URL -->
            <img id="statusGif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3B0N3Znd3B0N3Znd3B0N3Znd3B0N3Znd3B0N3Znd3B0N3ZnJmN0PXN/c7ggb8e2HNG/giphy.gif" alt="Cute gif">
        </div>
        <h1 id="questionText">Will you be my girlfriend?</h1>
        
        <div class="buttons">
            <button id="yesBtn" onclick="selectYes()">Yes</button>
            <button id="noBtn" onmouseover="moveNoButton()" onclick="moveNoButton()">No</button>
        </div>
    </div>

    <script>
        // Position the No button properly at the start
        const noBtn = document.getElementById('noBtn');
        noBtn.style.left = '160px'; 
        noBtn.style.top = '0px';

        function moveNoButton() {
            // Get random positions within the visible screen area
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 40);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 40);
            
            // Switch positioning to fixed so it can fly anywhere on screen
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function selectYes() {
            document.getElementById('questionText').innerHTML = "Yay! Best decision ever! ❤️";
            document.getElementById('statusGif').src = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3Znd3B0N3Znd3B0N3Znd3B0N3Znd3B0N3Znd3B0N3ZnJmN0PXN/KztT2c4Y8m7dxkW925/giphy.gif";
            // Hide the No button completely
            noBtn.style.display = 'none';
        }
    </script>
</body>
</html>
